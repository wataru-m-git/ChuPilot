version: '3.8'

services:
  app:
    build: .
    container_name: mouse-colony-app
    ports:
      - "3333:3333"
    env_file: .env.local
    environment:
      - NODE_ENV=production
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3333"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
